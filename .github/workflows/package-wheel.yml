name: Package wheel

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/package-wheel.yml"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - "pixi.lock"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.66.0
          cache: true

      - name: Build wheel
        run: |
          pixi run -e dev uv build
          pixi run -e dev uvx pkginfo dist/*whl

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: package-wheel
          path: dist/*.whl
          if-no-files-found: error

  publish-wheel:
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: package-wheel
          path: wheel-dist

      - name: Publish wheel to gh-pages
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
            git worktree add gh-pages-worktree gh-pages
          else
            git worktree add --detach gh-pages-worktree
            git -C gh-pages-worktree checkout --orphan gh-pages
            git -C gh-pages-worktree rm -rf . >/dev/null 2>&1 || true
          fi

          rm -rf gh-pages-worktree/wheels
          mkdir -p gh-pages-worktree/wheels
          cp wheel-dist/*.whl gh-pages-worktree/wheels/
          touch gh-pages-worktree/.nojekyll

          git -C gh-pages-worktree add -A
          if git -C gh-pages-worktree diff --cached --quiet; then
            echo "No wheel changes to publish."
          else
            git -C gh-pages-worktree commit -m "Update package wheel"
            git -C gh-pages-worktree push origin HEAD:gh-pages
          fi

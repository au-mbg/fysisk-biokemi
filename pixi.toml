[workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
quarto = ">=1.8.27,<2"
python = "3.12.*"

[pypi-dependencies]
fysisk-biokemi = { path = "course-utils", editable = true }

[feature.standard.pypi-dependencies]
biopython = "*"
scipy = "*"
jupyter = ">=1.1.1"
jupyter-cache = ">=1.0.1"
matplotlib = ">=3.10.6"
numpy = ">=2.3.3"
openpyxl = ">=3.1.5"
pandas = ">=2.3.2"
ipywidgets = ">=7.7.1"
anywidget = ">=0.9.18"
plotly = ">=6.3.0"

[feature.colab.pypi-dependencies]
jupyter = "*"
jupyter-cache = "*"
matplotlib = "*"
numpy = "*"
openpyxl = "*"
pandas = "*"
ipywidgets = "*"
anywidget = "*"
plotly = "*"
scipy = "*"

[feature.dev.pypi-dependencies]
nbformat = ">=5.10.4"
uv = "*"

[environments]
default = { solve-group = "default" }
colab = { features = ["colab"], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
standard = { features = ["standard"], solve-group = "default" }

[activation]
env = { TYPST_FONT_PATHS = "$PIXI_PROJECT_ROOT/fonts" }

[tasks.preview]
args = [{ "arg" = "mode", default = "master", choices = ["student", "master"] }]
cmd = "quarto preview --profile site-{{mode}}"
cwd = "course"
description = "Preview the course notes in either student or master mode"
default-environment = "standard"

[tasks.render]
args = [{ "arg" = "mode", default = "master", choices = ["student", "master"] }]
cmd = "quarto render --profile site-{{mode}},typst"
cwd = "course"
description = "Render the course notes in either student or master mode"
default-environment = "standard"
depends-on = ["fetch-fonts"]

[tasks.render-all]
depends-on = [
    "_clean",
    { task = "render", args = ["student"] },
    { task = "render", args = ["master"] },
    "_move-index",
]
description = "Clean and render the course notes in both student and master mode"

[tasks._clean]
cmd = """
  rm -rf _site-combined &&
  rm -rf **/*.pdf;
  rm -rf *.html;
  rm -rf lessons/*html lessons/*.ipynb lessons/*_files lessons/.ipynb_checkpoints;
  rm -rf datasets_files/ index_files/
  rm *.ipynb
  """
cwd = "course"
description = "Clean up old build artifacts before rendering"

[tasks._move-index]
cmd = "cp redirect/index.html _site-combined/index.html"
cwd = "course"
description = "Move the index.html to the combined site"

[tasks.fetch-fonts]
cmd = """
  echo "Checking for Font Awesome 6 fonts..." &&
  mkdir -p fonts &&
  curl -fsSL -o 'fonts/Font Awesome 6 Free-Regular-400.otf'   'https://raw.githubusercontent.com/FortAwesome/Font-Awesome/6.x/otfs/Font%20Awesome%206%20Free-Regular-400.otf' &&  curl -fsSL -o 'fonts/Font Awesome 6 Free-Solid-900.otf'     'https://raw.githubusercontent.com/FortAwesome/Font-Awesome/6.x/otfs/Font%20Awesome%206%20Free-Solid-900.otf' &&
  curl -fsSL -o 'fonts/Font Awesome 6 Brands-Regular-400.otf' 'https://raw.githubusercontent.com/FortAwesome/Font-Awesome/6.x/otfs/Font%20Awesome%206%20Brands-Regular-400.otf'
  """
description = "Download Font Awesome 6 fonts for Typst rendering (skipped if already present)"
outputs = [
    "fonts/Font Awesome 6 Free-Regular-400.otf",
    "fonts/Font Awesome 6 Free-Solid-900.otf",
    "fonts/Font Awesome 6 Brands-Regular-400.otf",
]

[tasks.build-wheel]
cmd = "rm -rf dist && uv build course-utils --out-dir dist"
description = "Build the course utility package wheel"
default-environment = "dev"
